# Tidegate egress proxy — CONNECT-only forward proxy
# All non-tunnel features disabled. No cache, no MITM, no SNI inspection.
#
# The proxy sees the target domain in the plaintext CONNECT request line,
# checks it against the allowlist, and creates a TCP tunnel if allowed.
# TLS is end-to-end between the agent and the LLM API.
#
# Hot-reload: docker kill --signal HUP <container>
# Or from inside: squid -k reconfigure
# Existing CONNECT tunnels survive reload.

# ── Listener ─────────────────────────────────────────────────
http_port 3128

# ── Disable everything we don't need ─────────────────────────
cache deny all
cache_mem 0 MB
icp_port 0
htcp_port 0
snmp_port 0
http_access deny manager
pipeline_prefetch 0

# ── Strip forwarding headers ─────────────────────────────────
httpd_suppress_version_string on
via off
forwarded_for delete

# ── ACLs ─────────────────────────────────────────────────────
acl CONNECT method CONNECT
acl SSL_Ports port 443
acl allowed_domains dstdomain "/etc/squid/allowlist.txt"

# ── Access rules: CONNECT-only, allowlisted domains, port 443 ─
http_access deny !CONNECT
http_access deny CONNECT !SSL_Ports
http_access allow CONNECT allowed_domains SSL_Ports
http_access deny all

# ── Logging ──────────────────────────────────────────────────
access_log stdio:/dev/stdout
cache_log stdio:/dev/stderr
cache_store_log none

# ── PID file location (writable by squid user) ───────────────
pid_filename /tmp/squid.pid
