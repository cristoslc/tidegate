server {
    listen 80;

    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    location /mcp {
        return 200 '{"jsonrpc":"2.0","id":1,"result":{"tools":[{"name":"echo","description":"test tool"}]}}';
        add_header Content-Type application/json;
    }

    location / {
        return 200 '{"service":"tidegate-gateway-mock","spike":"SPIKE-017"}';
        add_header Content-Type application/json;
    }
}
