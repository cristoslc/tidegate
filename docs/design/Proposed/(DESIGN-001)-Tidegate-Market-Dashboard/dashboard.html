<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tidegate Market Dashboard</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-l1: #3b82f6;
            --accent-l2: #8b5cf6;
            --accent-l3: #10b981;
            --accent-interceptor: #f59e0b;
            --accent-vm: #ef4444;
            --gap: #dc2626;
            --covered: #059669;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 2rem;
        }

        .dashboard {
            max-width: 1920px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--bg-tertiary);
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        header .meta {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .card h2 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .threat-matrix {
            width: 100%;
            border-collapse: collapse;
        }

        .threat-matrix th,
        .threat-matrix td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--bg-tertiary);
            font-size: 0.875rem;
        }

        .threat-matrix th {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .coverage-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .coverage-indicator.covered {
            background: var(--covered);
            color: white;
        }

        .coverage-indicator.gap {
            background: var(--gap);
            color: white;
        }

        .layer-badge {
            display: inline-block;
            padding: 0.125rem 0.5rem;
            border-radius: 3px;
            font-size: 0.625rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-right: 0.25rem;
        }

        .layer-badge.l1 { background: var(--accent-l1); }
        .layer-badge.l2 { background: var(--accent-l2); }
        .layer-badge.l3 { background: var(--accent-l3); }
        .layer-badge.interceptor { background: var(--accent-interceptor); }
        .layer-badge.vm { background: var(--accent-vm); }

        .tool-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .tool-item {
            background: var(--bg-tertiary);
            border-radius: 6px;
            padding: 1rem;
        }

        .tool-item h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .tool-item a {
            color: var(--accent-l1);
            text-decoration: none;
            font-size: 0.875rem;
        }

        .tool-item a:hover {
            text-decoration: underline;
        }

        .tool-meta {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .coverage-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.25rem;
            margin-top: 0.5rem;
        }

        .coverage-cell {
            text-align: center;
            padding: 0.25rem;
            border-radius: 3px;
            font-size: 0.625rem;
            font-weight: 600;
        }

        .coverage-cell.active {
            color: white;
        }

        .coverage-cell.inactive {
            background: var(--bg-primary);
            color: var(--text-secondary);
        }

        .composability-section {
            margin-top: 2rem;
        }

        .composability-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .compat-item {
            background: var(--bg-tertiary);
            border-radius: 6px;
            padding: 1rem;
        }

        .compat-item h3 {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .compat-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.75rem;
        }

        .compat-badge {
            padding: 0.125rem 0.5rem;
            border-radius: 3px;
            font-size: 0.625rem;
        }

        .compat-badge.compatible {
            background: var(--covered);
            color: white;
        }

        .compat-badge.conflicts {
            background: var(--gap);
            color: white;
        }

        .compat-badge.redundant {
            background: var(--accent-interceptor);
            color: white;
        }

        .legend {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Tidegate Market Dashboard</h1>
            <div class="meta">
                Snapshot: <span id="snapshot-date">2026-04-07</span> |
                Tools: <span id="tools-count">0</span> |
                <a href="market-data.json" style="color: var(--accent-l1);">View Raw Data</a>
            </div>
        </header>

        <div class="grid">
            <div class="card">
                <h2>Threat Coverage Matrix</h2>
                <table class="threat-matrix">
                    <thead>
                        <tr>
                            <th>Threat Vector</th>
                            <th>Coverage</th>
                            <th>Tools</th>
                        </tr>
                    </thead>
                    <tbody id="threat-matrix-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-dot" style="background: var(--covered);"></div>
                        <span>Market coverage exists</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot" style="background: var(--gap);"></div>
                        <span>Gap (no coverage)</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Tool Positioning</h2>
                <div class="tool-list" id="tool-list">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>

        <div class="card composability-section">
            <h2>Composability Analysis</h2>
            <div class="composability-grid" id="composability-grid">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script>
        let data = null;

        async function load() {
            const res = await fetch('market-data.json');
            data = await res.json();
            document.getElementById('snapshot-date').textContent = data.snapshot_date;
            document.getElementById('tools-count').textContent = data.sources_count;
            renderThreatMatrix();
            renderToolList();
            renderComposability();
        }

        function renderThreatMatrix() {
            const threats = [
                { id: 'unauthorized_egress', label: 'Unauthorized egress', layer: 'l3' },
                { id: 'credential_theft', label: 'Credential theft', layer: 'l3' },
                { id: 'encoded_exfiltration', label: 'Encoded exfiltration', layer: 'l1' },
                { id: 'semantic_exfiltration', label: 'Semantic exfiltration', layer: null },
                { id: 'pid1_laundering', label: 'PID 1 laundering', layer: null },
                { id: 'emergent_instrumental_goals', label: 'Emergent instrumental goals', layer: null },
                { id: 'tool_description_injection', label: 'Tool description injection', layer: 'l2' },
                { id: 'scanner_evasion', label: 'Scanner evasion (RL)', layer: null },
                { id: 'container_escape', label: 'Container escape', layer: 'vm' },
                { id: 'vm_escape', label: 'VM escape', layer: 'vm' }
            ];

            const tbody = document.getElementById('threat-matrix-body');
            tbody.innerHTML = '';

            threats.forEach(threat => {
                const toolsCovering = data.tools.filter(t =>
                    t.threat_vectors && t.threat_vectors.includes(threat.id)
                );

                const hasCoverage = toolsCovering.length > 0;
                const coverageClass = hasCoverage ? 'covered' : 'gap';
                const coverageText = hasCoverage ? `${toolsCovering.length} tool(s)` : 'No coverage';

                const layerBadge = threat.layer ?
                    `<span class="layer-badge ${threat.layer}">${threat.layer.replace('_', ' ')}</span>` : '';

                const row = `
                    <tr>
                        <td>${layerBadge}${threat.label}</td>
                        <td><span class="coverage-indicator ${coverageClass}">${coverageText}</span></td>
                        <td>${toolsCovering.map(t => `<a href="${t.url}" target="_blank">${t.name}</a>`).join(', ')}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function renderToolList() {
            const container = document.getElementById('tool-list');
            container.innerHTML = '';

            data.tools.forEach(tool => {
                const layers = [];
                if (tool.coverage.l1_taint) layers.push({ id: 'l1', label: 'L1' });
                if (tool.coverage.l2_mcp_gateway) layers.push({ id: 'l2', label: 'L2' });
                if (tool.coverage.l3_egress_proxy) layers.push({ id: 'l3', label: 'L3' });
                if (tool.coverage.interceptor) layers.push({ id: 'interceptor', label: 'Int' });
                if (tool.coverage.vm_isolation) layers.push({ id: 'vm', label: 'VM' });

                const html = `
                    <div class="tool-item">
                        <h3>${tool.name}</h3>
                        <a href="${tool.url}" target="_blank">${tool.url}</a>
                        <div class="tool-meta">
                            <span>${tool.license}</span>
                            <span>${tool.deployment.model}</span>
                            <span>${tool.deployment.platform.join(', ')}</span>
                        </div>
                        <div class="coverage-grid">
                            ${layers.map(l => `
                                <div class="coverage-cell active layer-badge ${l.id}">${l.label}</div>
                            `).join('')}
                            ${Array(5 - layers.length).fill('<div class="coverage-cell inactive">-</div>').join('')}
                        </div>
                        ${tool.notes ? `<div style="margin-top: 0.5rem; font-size: 0.75rem; color: var(--text-secondary);">${tool.notes}</div>` : ''}
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function renderComposability() {
            const container = document.getElementById('composability-grid');
            container.innerHTML = '';

            data.tools.forEach(tool => {
                if (!tool.composability ||
                    (!tool.composability.compatible_with?.length &&
                     !tool.composability.conflicts_with?.length &&
                     !tool.composability.redundant_with?.length)) {
                    return;
                }

                const badges = [];
                if (tool.composability.compatible_with?.length) {
                    badges.push(`<span class="compat-badge compatible">✓ Compatible: ${tool.composability.compatible_with.join(', ')}</span>`);
                }
                if (tool.composability.conflicts_with?.length) {
                    badges.push(`<span class="compat-badge conflicts">✗ Conflicts: ${tool.composability.conflicts_with.join(', ')}</span>`);
                }
                if (tool.composability.redundant_with?.length) {
                    badges.push(`<span class="compat-badge redundant">≈ Redundant: ${tool.composability.redundant_with.join(', ')}</span>`);
                }

                const html = `
                    <div class="compat-item">
                        <h3>${tool.name}</h3>
                        <div class="compat-list">${badges.join('')}</div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        load();
    </script>
</body>
</html>
