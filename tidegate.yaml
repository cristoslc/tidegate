# Tidegate configuration — Docker Compose environment
# For local dev without Docker, use gateway/tidegate.yaml instead.

version: "1"

defaults:
  scan_timeout_ms: 500
  scan_failure_mode: deny

servers:
  echo:
    transport: http
    url: http://echo-server:4200/mcp

  hello-world:
    transport: http
    url: http://hello-world:4300/mcp
