# hello-world.yaml — Schema mapping for the hello-world notes MCP server
#
# This mapping demonstrates all field classifications and how Tidegate
# enforces policy on each parameter:
#
#   system_param:   Constrained values with regex/enum validation, no leak scanning
#   user_content:   Free-text from agent, full 3-layer leak scanning
#
# In tidegate.yaml, this server is referenced as:
#   hello-world:
#     transport: http
#     url: http://hello-world:4300/mcp
#     tools: <contents of this file>

save_note:
  params:
    category:
      class: system_param
      type: string
      validation: "enum:work,personal,ideas,urgent"
      required: true
    body:
      class: user_content
      type: string
      required: true
      scan: [L1, L2, L3]

list_notes:
  params:
    category:
      class: system_param
      type: string
      validation: "enum:work,personal,ideas,urgent"
      required: false

get_note:
  params:
    id:
      class: system_param
      type: string
      validation: "regex:^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
      required: true
