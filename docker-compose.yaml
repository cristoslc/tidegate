# Tidegate — reference Docker Compose template
#
# Three-network topology: agent-net (internal) → tidegate → mcp-net (internal)
#                          agent-net → egress-proxy → proxy-net → internet
#
# Usage:
#   Dev:  docker compose up --build
#   Prod: op run --env-file .env -- docker compose up --build
#
# Requires Docker >= 25.0.5 (CVE-2024-29018 DNS exfiltration fix)
#
# This template includes a test echo MCP server and a hello-world
# demo server. For production, replace with real MCP server containers.

# ── Networks ─────────────────────────────────────────────────

networks:
  agent-net:
    # Agent + Tidegate + egress-proxy. No direct internet access.
    internal: true
    enable_ipv6: false

  proxy-net:
    # Egress-proxy only. Internet access for LLM API calls.
    enable_ipv6: false

  mcp-net:
    # Tidegate + MCP server containers. No internet access.
    internal: true
    enable_ipv6: false

# ── Services ─────────────────────────────────────────────────

services:

  # ── Tidegate gateway ─────────────────────────────────────
  tidegate:
    build:
      context: gateway/
      dockerfile: Dockerfile
    ports:
      - "4100:4100"
    volumes:
      - ./tidegate.yaml:/app/tidegate.yaml:ro
      - ./scanner:/app/scanner:ro
    environment:
      TIDEGATE_CONFIG: /app/tidegate.yaml
      TIDEGATE_PORT: "4100"
      TIDEGATE_SCANNER_PATH: /app/scanner/scanner.py
    networks:
      - agent-net
      - mcp-net
    depends_on:
      echo-server:
        condition: service_healthy
      hello-world:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    restart: unless-stopped

  # ── Egress proxy (Squid CONNECT-only) ────────────────────
  egress-proxy:
    build:
      context: egress-proxy/
      dockerfile: Dockerfile
    networks:
      - agent-net
      - proxy-net
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/squid
      - /var/log/squid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    restart: unless-stopped

  # ── Test echo MCP server ─────────────────────────────────
  # Replace with real MCP servers for production.
  echo-server:
    build:
      context: gateway/
      dockerfile: ../test/echo-server/Dockerfile
    networks:
      - mcp-net
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    restart: unless-stopped

  # ── Hello World MCP server (demo) ───────────────────────
  # In-memory note-taking service that demonstrates Tidegate's
  # field-level policy enforcement. See mappings/hello-world.yaml.
  hello-world:
    build:
      context: hello-world/
      dockerfile: Dockerfile
    networks:
      - mcp-net
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    restart: unless-stopped
